services:
  claude-code-webui:
    build: .
    container_name: claude-code-webui
    restart: unless-stopped
    ports:
      - "3420:3420"
    privileged: true
    volumes:
      # Mount workspace directory
      - ./workspace:/home/node/workspace
      # Mount Claude Code config for authentication
      - ~/.claude:/home/node/.claude
    environment:
      - PORT=3420
      - HOME=/home/node
      - USER=node
    networks:
      - claude-network

networks:
  claude-network:
    driver: bridge
