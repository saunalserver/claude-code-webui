services:
  claude-code-webui:
    build: .
    container_name: claude-code-webui
    restart: unless-stopped
    ports:
      - "3420:3420"
    privileged: true
    volumes:
      # Mount workspace directory
      - ./workspace:/home/appuser/workspace
      # Mount Claude/Gemini/ etc config for authentication
      - ~/.claude:/home/appuser/.claude
      # Mount uploads directory for file sharing
      - ./uploads:/home/appuser/uploads
    environment:
      - PORT=3420
      - CLI_COMMAND=${CLI_COMMAND:-claude}
      - CLI_ARGS=${CLI_ARGS:----dangerously-skip-permissions}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - HOME=/home/appuser
      - USER=appuser
